<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Admin Dashboard</h1>

    <p class="d-inline-flex gap-1">
      <a class="btn btn-primary" data-bs-toggle="collapse" href="#Posts" role="button" aria-expanded="false" aria-controls="collapseExample">
        Post
      </a>
      <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseExample" aria-expanded="false" aria-controls="collapseExample">
        Contact
      </button>
      <a class="btn btn-primary" href="/editPost/0" role="button" aria-expanded="false" aria-controls="collapseExample">
        Add a new Post
      </a>
      <button class="btn btn-primary" type="button" data-bs-target="#collapseExample" aria-expanded="false" aria-controls="collapseExample">
        Log Out
      </button>
    </p>
    <div class="" id="Posts">
      <div class="card card-body">
      <table class="table">
  <thead>
    <tr>
      <th scope="col">post_id</th>
      <th scope="col">Title</th>
      <th scope="col">Action</th>
  </tr>
  </thead>
  <tbody>
  {% for post in posts %}
    <tr>

        <th scope="row">{{post.post_id}}</th>
        <td>{{post.title}}</td>
        <td><a href="/editPost/{{post.post_id}}"><button type="button" class="btn btn-info">Edit</button></a>  </td>
        <td><a href="/delete/{{post.post_id}}"> <button type="button" class="btn btn-info">Delete</button></a>   </td>

    </tr>
    {% endfor %}
  </tbody>
</table>
      </div>
</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
