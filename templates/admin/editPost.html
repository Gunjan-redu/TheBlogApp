<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Hello, world!</h1>


    <form method="post">
        <div class="row mb-3">
        <label  class="col-sm-2 col-form-label">Title</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" name="title" value="{{post.title}}">
        </div>
        </div>
        <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Subtitle</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" name="subtitle">
        </div>
        </div>
        <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Location</label>
        <div class="col-sm-10">
        <input type="text" class="form-control" name="location">
        </div>
        </div>
        <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Slug</label>
        <div class="col-sm-10">
        <input type="text" class="form-control" name="slug">
        </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-2 col-form-label">Author</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" name ='author' placeholder="" value="">
            </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-2 col-form-label">Date</label>
            <div class="col-sm-10">
                <input type="date" class="form-control" name ='date' placeholder="" value="">
            </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-2 col-form-label">Image Url</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" name ='image' placeholder="" value="">
            </div>
        </div>
         <div class="form-group row">
        <label class="col-sm-2 col-form-label">Content 1</label>
            <div class="col-sm-10">
                <textarea type="text" class="form-control" name ='content1' placeholder=""> </textarea>
            </div>
     </div><br>
        <div class="form-group row">
    <label class="col-sm-2 col-form-label">Content 2</label>
    <div class="col-sm-10">
      <textarea type="text" class="form-control" name ='content2' placeholder=""></textarea>
    </div>
  </div><br>
        <button type="submit" class="btn btn-primary">Sign in</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
